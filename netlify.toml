[build]
  command = "REACT_APP_BUILD_TIME=$(date -u '+%Y-%m-%d %H:%M UTC') REACT_APP_VERSION=$(node -p \"require('./package.json').version\") npm run build"
  publish = "build"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/claude"
  to = "/.netlify/functions/claude"
  status = 200
